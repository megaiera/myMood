<!DOCTYPE html>
<html lang="fr">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="/style.css">
     <script src="/js/gestion.js" defer> </script>
     <title>MyMood app - Comment tu te sens aujourd'hui? - gestion des stagiaires</title>
<body>
     <header>
          <nav id="navbar">
                          <hgroup id="logo"> <h1> MyMood</h1>
                              <span>Comment tu te sens aujourd'hui?</span>
                         </hgroup>
                    
                    <input type="button" name="profil" id="profil" value="Profil">
                    <input type="button" name="deconnexion" id="btnDeco" value="Déconnexion">
          </nav>
     </header>  
     <main>
          <button class="returnBtn"> Retour</button>

          <section id="filterContainer"> <!-- FILTRE FORMATIONS/STAGIAIRES-->
               <h2>les formations</h2>
                    <div id="checkboxFilter">
                         <label for="backend"> Back_End</label>
                         <input type="checkbox" name="backend" id="backendCheckbox" value="backend"><br> 

                         <label for="frontend"> Front_end</label>
                         <input type="checkbox" name="frontend" id="frontendCheckbox" value="frontend"> <br>

                         <label for="cda"> CDA</label>
                         <input type="checkbox" name="cda" id="cdaCheckbox" value="cda"> <br>

                         <label for="prepnum1"> Prépa numérique 1</label>
                         <input type="checkbox" name="prepnum1" id="prepnum1Checkbox" value="prepnum1"> <br>

                         <label for="prepnum2"> Prépa numérique 2</label>
                         <input type="checkbox" name="prepnum2" id="prepnum2Checkbox" value="prepnum2"> <br>

                         <label for="poa"> POA</label>
                         <input type="checkbox" name="poa" id="poaCheckbox" value="poa"> 
                    </div>
                    <!-- AJOUTER FONCTION SUPPRIMER FORMATION-->
                         <input type="button" name="deleteBtn" class="deleteBtn" value="Supprimer les formations sélectionnées">

                    <div class="addNewFilterBtn">
                         <input type="text" name="addBtn" id="addBtn" value="" placeholder="nouvelle formation">
                         <input type="image" name="createFilter" id="createFilter" src="">
                    </div>
          </section> 
                    
          <section id="addInternContainer"> <!-- AJOUTER UN STAGIAIRE-->
                    <form action="#">
                         <fieldset>
                              <legend>Ajouter un stagiaire</legend>
                                   <input type="text" name="addName" id="addName" placeholder="Prénom">
                                   <input type="text" name="addSurname" id="addSurname" placeholder="Nom">
                                   <select name="formations" id="selectFormation">
                                        <option value="defaultCourse">Formation</option>
                                        <option value="frontend">Front End</option>
                                        <option value="backend">Back End</option>
                                        <option value="cda">CDA</option>
                                        <option value="prepnum1">Prépa Numérique 1</option>
                                        <option value="prepnum2">Prépa Numérique 2</option>
                                        <option value="poa">POA</option>
                                   </select>
                                   <input type="email" name="addMail" id="addMail" placeholder="imts@institutsolacroup.com">
                                   <input type="image" value="createNewIntern" src="/icons/">
                         </fieldset>
                    </form>
          </section>

           <section id="internsListContainer"> <!-- LISTE ET GESTION DES STAGIAIRES-->
                    <h2> Les stagiaires</h2>
                         <ul id="internsList">

                         </ul>
                         <input type="button" name="deleteBtn" class="deleteBtn" value="Supprimer les stagiaires sélectionnés">
          </section>         
          
     </main>
</body>
</html>
